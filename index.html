<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWASP Pentest Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a12;
    --bg2: #0b1221;
    --bg3: #111c30;
    --bg4: #162038;
    --border: rgba(0,200,170,0.12);
    --border2: rgba(0,200,170,0.25);
    --accent: #00c8aa;
    --accent2: #0af0cc;
    --pass: #22c55e;
    --pass-bg: rgba(34,197,94,0.1);
    --pass-border: rgba(34,197,94,0.3);
    --na: #64748b;
    --na-bg: rgba(100,116,139,0.12);
    --na-border: rgba(100,116,139,0.3);
    --pending: #f59e0b;
    --pending-bg: rgba(245,158,11,0.1);
    --pending-border: rgba(245,158,11,0.3);
    --text: #d1ddf5;
    --text2: #8899bb;
    --text3: #566a8a;
    --danger: #ef4444;
    --sidebar-w: 280px;
    --header-h: 70px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- NOISE OVERLAY ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ---- SIDEBAR ---- */
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .sidebar-header {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .sidebar-subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* overall progress mini */
  .sidebar-progress-wrap {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .sidebar-progress-bar {
    height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }

  .sidebar-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .sidebar-stats {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .sidebar-stat {
    flex: 1;
    text-align: center;
    padding: 6px 4px;
    border-radius: 6px;
    border: 1px solid;
  }

  .sidebar-stat.pass { border-color: var(--pass-border); background: var(--pass-bg); }
  .sidebar-stat.na { border-color: var(--na-border); background: var(--na-bg); }
  .sidebar-stat.pending { border-color: var(--pending-border); background: var(--pending-bg); }

  .sidebar-stat-n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
  }

  .sidebar-stat.pass .sidebar-stat-n { color: var(--pass); }
  .sidebar-stat.na .sidebar-stat-n { color: var(--na); }
  .sidebar-stat.pending .sidebar-stat-n { color: var(--pending); }

  .sidebar-stat-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* nav */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }

  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .nav-section-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 10px 8px 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }

  .nav-item:hover { background: var(--bg3); border-color: var(--border); }
  .nav-item.active { background: rgba(0,200,170,0.08); border-color: var(--border2); }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--bg4);
    border: 1.5px solid var(--text3);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .nav-item.active .nav-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .nav-item-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.3;
    flex: 1;
  }

  .nav-item.active .nav-item-text { color: var(--text); }

  .nav-item-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  /* sidebar actions */
  .sidebar-actions {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-sidebar {
    width: 100%;
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-sidebar:hover { background: rgba(0,200,170,0.08); border-color: var(--accent); }

  .btn-sidebar.danger { border-color: rgba(239,68,68,0.3); color: var(--danger); }
  .btn-sidebar.danger:hover { background: rgba(239,68,68,0.08); border-color: var(--danger); }

  /* ---- MAIN ---- */
  #main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ---- TOPBAR ---- */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(6,10,18,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .topbar-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .topbar-section-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* search */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }

  #search-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px 8px 36px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    width: 240px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text3); }

  /* filter buttons */
  .filter-pills {
    display: flex;
    gap: 6px;
  }

  .filter-pill {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
  }

  .filter-pill:hover { border-color: var(--border2); color: var(--text2); }
  .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,170,0.08); }
  .filter-pill[data-filter="pass"].active { border-color: var(--pass); color: var(--pass); background: var(--pass-bg); }
  .filter-pill[data-filter="na"].active { border-color: var(--na); color: var(--na); background: var(--na-bg); }
  .filter-pill[data-filter="pending"].active { border-color: var(--pending); color: var(--pending); background: var(--pending-bg); }
  .filter-pill[data-filter="none"].active { border-color: var(--text2); color: var(--text2); background: rgba(100,116,139,0.12); }

  /* ---- CONTENT ---- */
  #content {
    padding: 32px;
    max-width: 1100px;
  }

  /* category section */
  .category-section {
    margin-bottom: 48px;
    scroll-margin-top: calc(var(--header-h) + 20px);
  }

  .category-header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .category-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .category-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .category-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cat-progress-bar {
    width: 120px;
    height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }

  .cat-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .cat-progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* test card */
  .test-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: all 0.2s;
    overflow: hidden;
  }

  .test-card:hover { border-color: var(--border2); }
  .test-card.status-pass { border-left: 3px solid var(--pass); }
  .test-card.status-na { border-left: 3px solid var(--na); opacity: 0.6; }
  .test-card.status-pending { border-left: 3px solid var(--pending); }
  .test-card.status-none { border-left: 3px solid var(--bg4); }
  .test-card.hidden { display: none; }

  .card-main {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .card-id-wrap {
    flex-shrink: 0;
    padding-top: 2px;
  }

  .card-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    background: rgba(0,200,170,0.08);
    border: 1px solid rgba(0,200,170,0.2);
    border-radius: 5px;
    padding: 3px 8px;
    white-space: nowrap;
  }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-objectives {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .card-objectives.show { display: block; }

  .card-objectives ul {
    padding-left: 16px;
  }

  .card-objectives ul li {
    margin-bottom: 3px;
  }

  .card-toggle-obj {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 11px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    padding: 0;
    transition: color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  .card-toggle-obj:hover { color: var(--accent); }

  .card-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .status-buttons {
    display: flex;
    gap: 6px;
  }

  .btn-status {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-status.pass {
    border-color: var(--pass-border);
    color: var(--pass);
    background: transparent;
  }
  .btn-status.pass:hover,
  .btn-status.pass.active {
    background: var(--pass-bg);
    border-color: var(--pass);
    box-shadow: 0 0 10px rgba(34,197,94,0.2);
  }

  .btn-status.na {
    border-color: var(--na-border);
    color: var(--na);
    background: transparent;
  }
  .btn-status.na:hover,
  .btn-status.na.active {
    background: var(--na-bg);
    border-color: var(--na);
  }

  .btn-status.pending {
    border-color: var(--pending-border);
    color: var(--pending);
    background: transparent;
  }
  .btn-status.pending:hover,
  .btn-status.pending.active {
    background: var(--pending-bg);
    border-color: var(--pending);
    box-shadow: 0 0 10px rgba(245,158,11,0.2);
  }

  /* notes */
  .card-notes-wrap {
    padding: 0 20px 16px;
    display: none;
  }

  .card-notes-wrap.show { display: block; }

  .card-notes {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.6;
  }

  .card-notes:focus { border-color: var(--accent); }
  .card-notes::placeholder { color: var(--text3); }

  .card-notes-label {
    font-size: 10px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* ---- REPORT MODAL ---- */
  #report-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(6,10,18,0.9);
    backdrop-filter: blur(8px);
  }

  #report-modal.show { display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }

  .report-container {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 100%;
    max-width: 860px;
    padding: 0;
    overflow: hidden;
  }

  .report-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .report-toolbar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }

  .btn-report-action {
    padding: 7px 16px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-report-action:hover { background: rgba(0,200,170,0.08); }
  .btn-report-action.close-btn { color: var(--text3); border-color: var(--border); }
  .btn-report-action.close-btn:hover { color: var(--danger); border-color: var(--danger); }

  #report-content {
    padding: 32px;
  }

  .report-header {
    border-bottom: 2px solid var(--accent);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }

  .report-logo-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .report-main-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
  }

  .report-meta {
    display: flex;
    gap: 32px;
    margin-top: 10px;
  }

  .report-meta-item {
    font-size: 12px;
  }

  .report-meta-label {
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 2px;
  }

  .report-meta-val { color: var(--text); font-weight: 600; }

  /* summary grid */
  .report-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .report-sum-card {
    border-radius: 10px;
    padding: 16px;
    border: 1px solid;
    text-align: center;
  }

  .report-sum-card.total { border-color: var(--border2); background: var(--bg3); }
  .report-sum-card.pass { border-color: var(--pass-border); background: var(--pass-bg); }
  .report-sum-card.na { border-color: var(--na-border); background: var(--na-bg); }
  .report-sum-card.pending { border-color: var(--pending-border); background: var(--pending-bg); }

  .report-sum-n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }

  .report-sum-card.total .report-sum-n { color: var(--text); }
  .report-sum-card.pass .report-sum-n { color: var(--pass); }
  .report-sum-card.na .report-sum-n { color: var(--na); }
  .report-sum-card.pending .report-sum-n { color: var(--pending); }

  .report-sum-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* report section */
  .report-section {
    margin-bottom: 28px;
  }

  .report-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .report-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .report-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg3);
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }

  .report-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    vertical-align: top;
    line-height: 1.5;
  }

  .report-table tr:hover td { background: var(--bg3); }

  .report-status-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    white-space: nowrap;
    border: 1px solid;
  }

  .badge-pass { color: var(--pass); border-color: var(--pass-border); background: var(--pass-bg); }
  .badge-na { color: var(--na); border-color: var(--na-border); background: var(--na-bg); }
  .badge-pending { color: var(--pending); border-color: var(--pending-border); background: var(--pending-bg); }
  .badge-none { color: var(--text3); border-color: var(--border); background: transparent; }

  /* cat bar chart in report */
  .cat-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .cat-bar-name { width: 260px; flex-shrink: 0; color: var(--text2); font-size: 11px; }
  .cat-bar-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .cat-bar-pct { width: 40px; text-align: right; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

  /* ---- PROJECT CONFIG MODAL ---- */
  #config-modal {
    display: none;

// ===== STATE =====
let state = {};
let project = { name: '', target: '', tester: '', date: '', scope: '' };
let currentFilter = 'all';
let currentSearch = '';

const STORAGE_KEY = 'pentest_checklist_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state = saved.state || {};
      project = saved.project || project;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ state, project }));
  } catch(e) {}
}

function setStatus(testId, status) {
  if (!state[testId]) state[testId] = { status: 'none', notes: '' };
  state[testId].status = status;
  saveState();
  updateCard(testId);
  updateStats();
}

function setNotes(testId, notes) {
  if (!state[testId]) state[testId] = { status: 'none', notes: '' };
  state[testId].notes = notes;
  saveState();
}

function getStatus(testId) {
  return (state[testId] && state[testId].status) || 'none';
}

function getNotes(testId) {
  return (state[testId] && state[testId].notes) || '';
}

// ===== BUILD UI =====
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '<div class="nav-section-label">Categorías</div>';
  CATEGORIES.forEach(cat => {
    const tests = TESTS.filter(t => t.cat === cat.id);
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.id = 'nav-' + cat.id;
    el.onclick = () => {
      document.getElementById('section-' + cat.id).scrollIntoView({ behavior: 'smooth' });
    };
    el.innerHTML = `
      <div class="nav-dot"></div>
      <div class="nav-item-text">${cat.name}</div>
      <div class="nav-item-count" id="nav-count-${cat.id}">0/${tests.length}</div>
    `;
    nav.appendChild(el);
  });
}

function buildContent() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state" id="empty-state">// sin resultados para este filtro</div>';

  CATEGORIES.forEach(cat => {
    const tests = TESTS.filter(t => t.cat === cat.id);
    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = 'section-' + cat.id;

    section.innerHTML = `
      <div class="category-header">
        <div>
          <div class="category-code">${cat.code}</div>
          <div class="category-name">${cat.name}</div>
        </div>
        <div class="category-meta">
          <div class="cat-progress-text" id="cat-pct-${cat.id}">0/${tests.length}</div>
          <div class="cat-progress-bar"><div class="cat-progress-fill" id="cat-bar-${cat.id}" style="width:0%"></div></div>
        </div>
      </div>
    `;

    tests.forEach(test => {
      const card = buildCard(test);
      section.appendChild(card);
    });

    content.appendChild(section);
  });
}

function buildCard(test) {
  const card = document.createElement('div');
  card.className = 'test-card status-' + getStatus(test.id);
  card.id = 'card-' + test.id;

  const objItems = test.obj.map(o => `<li>${o}</li>`).join('');
  const notes = getNotes(test.id);

  card.innerHTML = `
    <div class="card-main">
      <div class="card-id-wrap">
        <div class="card-id">${test.id}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${test.name}</div>
        <button class="card-toggle-obj" onclick="toggleObj('${test.id}')">
          <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          objetivos
        </button>
        <div class="card-objectives" id="obj-${test.id}"><ul>${objItems}</ul></div>
      </div>
      <div class="card-actions">
        <div class="status-buttons">
          <button class="btn-status pass ${getStatus(test.id)==='pass'?'active':''}" onclick="setStatus('${test.id}','pass')">✓ Pasó</button>
          <button class="btn-status na ${getStatus(test.id)==='na'?'active':''}" onclick="setStatus('${test.id}','na')">— N/A</button>
          <button class="btn-status pending ${getStatus(test.id)==='pending'?'active':''}" onclick="setStatus('${test.id}','pending')">⚑ Aplica</button>
        </div>
      </div>
    </div>
    <div class="card-notes-wrap ${notes?'show':''}" id="notes-wrap-${test.id}">
      <div class="card-notes-label">// notas</div>
      <textarea class="card-notes" placeholder="Agrega notas, evidencia, herramientas usadas..." oninput="handleNotes('${test.id}',this.value)">${notes}</textarea>
    </div>
  `;

  return card;
}

function handleNotes(testId, value) {
  setNotes(testId, value);
}

function toggleObj(testId) {
  const el = document.getElementById('obj-' + testId);
  el.classList.toggle('show');
}

function updateCard(testId) {
  const card = document.getElementById('card-' + testId);
  if (!card) return;
  const status = getStatus(testId);
  card.className = 'test-card status-' + status;
  if (currentFilter !== 'all' && currentFilter !== status) {
    card.classList.add('hidden');
  }

  // update buttons
  card.querySelectorAll('.btn-status').forEach(btn => {
    btn.classList.remove('active');
    if (btn.classList.contains(status)) btn.classList.add('active');
  });

  // show notes when card has status
  const notesWrap = document.getElementById('notes-wrap-' + testId);
  if (notesWrap && (status !== 'none' || getNotes(testId))) {
    notesWrap.classList.add('show');
  }

  updateCategoryStats();
}

// ===== STATS =====
function updateStats() {
  const total = TESTS.length;
  let pass = 0, na = 0, pending = 0;
  TESTS.forEach(t => {
    const s = getStatus(t.id);
    if (s === 'pass') pass++;
    else if (s === 'na') na++;
    else if (s === 'pending') pending++;
  });

  const done = pass + na + pending;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('total-pass').textContent = pass;
  document.getElementById('total-na').textContent = na;
  document.getElementById('total-pending').textContent = pending;

  updateCategoryStats();
  updateNavActive();
}

function updateCategoryStats() {
  CATEGORIES.forEach(cat => {
    const tests = TESTS.filter(t => t.cat === cat.id);
    const done = tests.filter(t => getStatus(t.id) !== 'none').length;
    const pct = tests.length > 0 ? Math.round((done/tests.length)*100) : 0;

    const pctEl = document.getElementById('cat-pct-' + cat.id);
    const barEl = document.getElementById('cat-bar-' + cat.id);
    const navCount = document.getElementById('nav-count-' + cat.id);

    if (pctEl) pctEl.textContent = done + '/' + tests.length;
    if (barEl) barEl.style.width = pct + '%';
    if (navCount) navCount.textContent = done + '/' + tests.length;
  });
}

function updateNavActive() {
  // intersection observer handles this, but we do it on scroll too
}

// ===== INTERSECTION OBSERVER =====
function setupObserver() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const catId = e.target.id.replace('section-', '');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const navEl = document.getElementById('nav-' + catId);
        if (navEl) navEl.classList.add('active');

        const cat = CATEGORIES.find(c => c.id === catId);
        if (cat) {
          document.getElementById('topbar-cat-id').textContent = cat.code;
          document.getElementById('topbar-cat-name').textContent = cat.name;
        }
      }
    });
  }, { threshold: 0.1, rootMargin: '-70px 0px -60% 0px' });

  CATEGORIES.forEach(cat => {
    const el = document.getElementById('section-' + cat.id);
    if (el) obs.observe(el);
  });
}

// ===== FILTER & SEARCH =====
document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.onclick = () => {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    applyFilters();
  };
});

document.getElementById('search-input').oninput = function() {
  currentSearch = this.value.toLowerCase().trim();
  applyFilters();
};

function applyFilters() {
  let visibleCount = 0;
  TESTS.forEach(test => {
    const card = document.getElementById('card-' + test.id);
    if (!card) return;

    const status = getStatus(test.id);
    const matchFilter = currentFilter === 'all' || status === currentFilter;
    const matchSearch = !currentSearch ||
      test.id.toLowerCase().includes(currentSearch) ||
      test.name.toLowerCase().includes(currentSearch) ||
      test.obj.some(o => o.toLowerCase().includes(currentSearch));

    if (matchFilter && matchSearch) {
      card.classList.remove('hidden');
      visibleCount++;
    } else {
      card.classList.add('hidden');
    }
  });

  // show/hide category sections
  CATEGORIES.forEach(cat => {
    const section = document.getElementById('section-' + cat.id);
    if (!section) return;
    const tests = TESTS.filter(t => t.cat === cat.id);
    const anyVisible = tests.some(t => {
      const card = document.getElementById('card-' + t.id);
      return card && !card.classList.contains('hidden');
    });
    section.style.display = anyVisible ? '' : 'none';
  });

  document.getElementById('empty-state').style.display = visibleCount === 0 ? 'block' : 'none';
}

function openReport() {
  const modal = document.getElementById('report-modal');
  document.getElementById('report-content').innerHTML = buildReportHTML();
  modal.classList.add('show');
}

function closeReport() {
  document.getElementById('report-modal').classList.remove('show');
}

function printReport() {
  const content = document.getElementById('report-content').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`
    <!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Reporte Pentest</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <style>
      :root { --bg:#060a12;--bg2:#0b1221;--bg3:#111c30;--bg4:#162038;--border:rgba(0,200,170,0.12);--border2:rgba(0,200,170,0.25);--accent:#00c8aa;--pass:#22c55e;--pass-bg:rgba(34,197,94,0.1);--pass-border:rgba(34,197,94,0.3);--na:#64748b;--na-bg:rgba(100,116,139,0.12);--na-border:rgba(100,116,139,0.3);--pending:#f59e0b;--pending-bg:rgba(245,158,11,0.1);--pending-border:rgba(245,158,11,0.3);--text:#d1ddf5;--text2:#8899bb;--text3:#566a8a; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--text); padding:40px; }
      .report-logo-line{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
      .report-main-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);}
      .report-header{border-bottom:2px solid var(--accent);padding-bottom:20px;margin-bottom:28px;}
      .report-meta{display:flex;gap:32px;margin-top:10px;}
      .report-meta-item{font-size:12px;}
      .report-meta-label{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}
      .report-meta-val{color:var(--text);font-weight:600;}
      .report-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
      .report-sum-card{border-radius:10px;padding:16px;border:1px solid;text-align:center;}
      .report-sum-card.total{border-color:var(--border2);background:var(--bg3);}
      .report-sum-card.pass{border-color:var(--pass-border);background:var(--pass-bg);}
      .report-sum-card.na{border-color:var(--na-border);background:var(--na-bg);}
      .report-sum-card.pending{border-color:var(--pending-border);background:var(--pending-bg);}
      .report-sum-n{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;line-height:1;}
      .report-sum-card.total .report-sum-n{color:var(--text);}
      .report-sum-card.pass .report-sum-n{color:var(--pass);}
      .report-sum-card.na .report-sum-n{color:var(--na);}
      .report-sum-card.pending .report-sum-n{color:var(--pending);}
      .report-sum-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
      .report-section{margin-bottom:28px;}
      .report-section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
      .report-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
      .report-table{width:100%;border-collapse:collapse;font-size:12px;}
      .report-table th{text-align:left;padding:8px 12px;background:var(--bg3);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
      .report-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;line-height:1.5;}
      .report-status-badge{padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:10px;white-space:nowrap;border:1px solid;}
      .badge-pass{color:var(--pass);border-color:var(--pass-border);background:var(--pass-bg);}
      .badge-na{color:var(--na);border-color:var(--na-border);background:var(--na-bg);}
      .badge-pending{color:var(--pending);border-color:var(--pending-border);background:var(--pending-bg);}
      .badge-none{color:var(--text3);border-color:var(--border);}
      .cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
      .cat-bar-name{width:260px;flex-shrink:0;color:var(--text2);font-size:11px;}
      .cat-bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
      .cat-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#0af0cc);}
      .cat-bar-pct{width:40px;text-align:right;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;}
    </style>
    </head><body>${content}</body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

function buildReportHTML() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

  const total = TESTS.length;
  let pass = 0, na = 0, pending = 0;
  TESTS.forEach(t => {
    const s = getStatus(t.id);
    if (s === 'pass') pass++;
    else if (s === 'na') na++;
    else if (s === 'pending') pending++;
  });
  const done = pass + na + pending;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  // Category bars
  let catBars = '';
  CATEGORIES.forEach(cat => {
    const tests = TESTS.filter(t => t.cat === cat.id);
    const catDone = tests.filter(t => getStatus(t.id) !== 'none').length;
    const catPct = tests.length > 0 ? Math.round((catDone/tests.length)*100) : 0;
    catBars += `
      <div class="cat-bar-row">
        <div class="cat-bar-name">${cat.name}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${catPct}%"></div></div>
        <div class="cat-bar-pct">${catPct}%</div>
      </div>
    `;
  });

  // All tests table
  let testRows = '';
  CATEGORIES.forEach(cat => {
    const tests = TESTS.filter(t => t.cat === cat.id);
    tests.forEach(test => {
      const status = getStatus(test.id);
      const notes = getNotes(test.id);
      let badgeClass, badgeText;
      if (status === 'pass') { badgeClass = 'badge-pass'; badgeText = '✓ Pasó'; }
      else if (status === 'na') { badgeClass = 'badge-na'; badgeText = '— N/A'; }
      else if (status === 'pending') { badgeClass = 'badge-pending'; badgeText = '⚑ Aplica'; }
      else { badgeClass = 'badge-none'; badgeText = '· Sin estado'; }

      testRows += `
        <tr>
          <td><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#00c8aa">${test.id}</span></td>
          <td>${test.name}</td>
          <td><span class="report-status-badge ${badgeClass}">${badgeText}</span></td>
          <td style="max-width:200px;font-size:11px;color:#566a8a">${notes || '—'}</td>
        </tr>
      `;
    });
  });

  // Pending items only
  const pendingTests = TESTS.filter(t => getStatus(t.id) === 'pending');
  let pendingRows = '';
  if (pendingTests.length > 0) {
    pendingTests.forEach(test => {
      const notes = getNotes(test.id);
      pendingRows += `
        <tr>
          <td><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#f59e0b">${test.id}</span></td>
          <td>${test.name}</td>
          <td style="max-width:220px;font-size:11px">${test.obj[0]}</td>
          <td style="max-width:160px;font-size:11px;color:#566a8a">${notes || '—'}</td>
        </tr>
      `;
    });
  }

  return `
    <div class="report-header">
      <div class="report-logo-line">OWASP Testing Guide — Reporte de Seguridad</div>
      <div class="report-main-title">${project.name || 'Pentest Checklist'}</div>
      <div class="report-meta">
        ${project.target ? `<div class="report-meta-item"><span class="report-meta-label">Target</span><span class="report-meta-val">${project.target}</span></div>` : ''}
        ${project.tester ? `<div class="report-meta-item"><span class="report-meta-label">Pentester</span><span class="report-meta-val">${project.tester}</span></div>` : ''}
        ${project.date ? `<div class="report-meta-item"><span class="report-meta-label">Inicio</span><span class="report-meta-val">${project.date}</span></div>` : ''}
        ${project.scope ? `<div class="report-meta-item"><span class="report-meta-label">Alcance</span><span class="report-meta-val">${project.scope}</span></div>` : ''}
        <div class="report-meta-item"><span class="report-meta-label">Generado</span><span class="report-meta-val">${dateStr} ${timeStr}</span></div>
      </div>
    </div>

    <div class="report-summary-grid">
      <div class="report-sum-card total">
        <div class="report-sum-n">${total}</div>
        <div class="report-sum-label">Total</div>
      </div>
      <div class="report-sum-card pass">
        <div class="report-sum-n">${pass}</div>
        <div class="report-sum-label">Pasó</div>
      </div>
      <div class="report-sum-card na">
        <div class="report-sum-n">${na}</div>
        <div class="report-sum-label">No Aplica</div>
      </div>
      <div class="report-sum-card pending">
        <div class="report-sum-n">${pendingTests.length}</div>
        <div class="report-sum-label">Aplica N/R</div>
      </div>
    </div>

    <div class="report-section">
      <div class="report-section-title">Cobertura por Categoría</div>
      ${catBars}
    </div>

    ${pendingTests.length > 0 ? `
    <div class="report-section">
      <div class="report-section-title">⚑ Pruebas Pendientes (${pendingTests.length})</div>
      <table class="report-table">
        <thead><tr><th>ID</th><th>Prueba</th><th>Objetivo</th><th>Notas</th></tr></thead>
        <tbody>${pendingRows}</tbody>
      </table>
    </div>
    ` : ''}

    <div class="report-section">
      <div class="report-section-title">Detalle Completo (${total} pruebas)</div>
      <table class="report-table">
        <thead><tr><th>ID</th><th>Prueba</th><th>Estado</th><th>Notas</th></tr></thead>
        <tbody>${testRows}</tbody>
      </table>
    </div>
  `;
}

// ===== EXPORT =====
function exportData() {
  const exportObj = {
    project,
    generatedAt: new Date().toISOString(),
    tests: TESTS.map(t => ({
      id: t.id,
      name: t.name,
      category: t.cat,
      status: getStatus(t.id),
      notes: getNotes(t.id)
    }))
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pentest-${(project.name||'checklist').replace(/\s+/g,'-')}-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  showToast('JSON exportado ✓');
}

// ===== RESET =====
function confirmReset() {
  if (confirm('¿Reiniciar todo el checklist? Se perderán todos los estados y notas.')) {
    state = {};
    saveState();
    document.querySelectorAll('.test-card').forEach(card => {
      const testId = card.id.replace('card-', '');
      card.className = 'test-card status-none';
      card.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
      const notesWrap = document.getElementById('notes-wrap-' + testId);
      if (notesWrap) { notesWrap.classList.remove('show'); }
      const textarea = card.querySelector('.card-notes');
      if (textarea) textarea.value = '';
    });
    updateStats();
    showToast('Checklist reiniciado');
  }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
function init() {
  loadState();
  buildSidebar();
  buildContent();
  setupObserver();
  updateStats();
  applyFilters();

  if (project.name) {
    document.getElementById('project-name-display').textContent = project.name;
  }

  // Close modals on backdrop click
  document.getElementById('config-modal').onclick = function(e) {
    if (e.target === this) closeConfig();
  };
  document.getElementById('report-modal').onclick = function(e) {
    if (e.target === this) closeReport();
  };

  // Open config on first visit
  if (!project.name) {
    setTimeout(openConfig, 600);
  }
}

init();
</script>
